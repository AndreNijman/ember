# ember keybinds for Hyprland.
# Source from your hyprland.conf with: source = ./aqs/binds.conf

# === Application Launchers ===
bind = SUPER, T, exec, kitty
bind = SUPER, B, exec, aqs ipc wallpaper toggle
bind = ALT, space, exec, aqs ipc launcher toggle
bind = SUPER, V, exec, aqs ipc clipboard toggle
bind = SUPER, Period, exec, aqs ipc launcher toggle
bind = SUPER, K, exec, aqs ipc control toggle
bind = SUPER, TAB, exec, aqs ipc overview toggle
bind = SUPER, N, exec, aqs ipc notifications toggle

# === Cheat sheet ===
bind = SUPER, Slash, exec, aqs ipc keybinds toggle
bind = SUPER SHIFT, Slash, exec, aqs ipc keybinds toggle

# === Security ===
bind = SUPER, L, exec, aqs ipc lock lock
bind = SUPER ALT, L, exec, aqs ipc lock lock
bind = SUPER SHIFT, E, exit
bind = CTRL ALT, Delete, exec, aqs ipc powermenu toggle
bindl = CTRL ALT, C, exec, aqs ipc notifications clearAll

# === Audio Controls ===
bindel = , XF86AudioRaiseVolume, exec, aqs ipc audio increment 3
bindel = , XF86AudioLowerVolume, exec, aqs ipc audio decrement 3
bindl = , XF86AudioMute,        exec, aqs ipc audio mute
bindl = , XF86AudioMicMute,     exec, aqs ipc audio micmute
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioNext,  exec, playerctl next
bindl = CTRL SUPER, Space, exec, playerctl play-pause
bindl = CTRL SUPER, Equal, exec, playerctl next
bindl = CTRL SUPER, Minus, exec, playerctl previous

# === Brightness Controls ===
bindel = , XF86MonBrightnessUp,   exec, aqs ipc brightness increment 5
bindel = , XF86MonBrightnessDown, exec, aqs ipc brightness decrement 5

# === Window Management ===
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating

# === Focus Navigation ===
bind = SUPER, left,  movefocus, l
bind = SUPER, down,  movefocus, d
bind = SUPER, up,    movefocus, u
bind = SUPER, right, movefocus, r

# === Window Movement ===
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, down,  movewindow, d
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, right, movewindow, r

# === Workspace Navigation ===
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# === Move to Numbered Workspaces ===
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# === Mouse Wheel Navigation ===
bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up,   workspace, e+1

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindmd = SUPER, mouse:272, Move window,   movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# === Manual Sizing ===
binde = SUPER,        minus, resizeactive, -10% 0
binde = SUPER,        equal, resizeactive,  10% 0
binde = SUPER SHIFT,  minus, resizeactive,  0 -10%
binde = SUPER SHIFT,  equal, resizeactive,  0  10%

# === Screenshots (requires hyprshot, hyprpicker) ===
bindl = , Print,             exec, hyprshot -m output -m active --clipboard-only
bind  = CTRL, Print,         exec, hyprshot -m output
bind  = ALT,  Print,         exec, hyprshot -m window
bind  = SUPER SHIFT, S,      exec, hyprshot -m region --clipboard-only
bind  = SUPER SHIFT, C,      exec, hyprpicker -a

# === System Controls ===
bind = SUPER SHIFT, P, dpms, toggle
